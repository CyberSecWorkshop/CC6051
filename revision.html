<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC6051 – Full Exam Quiz Weeks 1–10</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');
  :root{
    --bg:#f7f6f2;--card:#ffffff;--border:#dddbd4;
    --correct:#1a6b3c;--correct-bg:#edf7f1;--correct-border:#a8d5bc;
    --wrong:#b01c1c;--wrong-bg:#fdf0f0;--wrong-border:#f0b8b8;
    --reveal:#1a5c6b;--reveal-bg:#edf5f7;--reveal-border:#a8cfd8;
    --text:#1a1a1a;--muted:#7a7870;
    --mono:'IBM Plex Mono',monospace;--serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:3rem 1rem 5rem;}
  header{text-align:center;max-width:720px;margin:0 auto 3rem;border-bottom:1.5px solid var(--border);padding-bottom:2rem;}
  .tag{display:inline-block;font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;}
  h1{font-family:var(--serif);font-size:clamp(2rem,5vw,3rem);font-weight:400;line-height:1.15;margin-bottom:.4rem;}
  .subtitle{color:var(--muted);font-size:.88rem;font-family:var(--mono);letter-spacing:.05em;}
  .meta-row{max-width:720px;margin:0 auto .6rem;display:flex;justify-content:space-between;font-family:var(--mono);font-size:.7rem;color:var(--muted);}
  .progress-bar{max-width:720px;margin:0 auto 2.5rem;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--text);transition:width .4s ease;width:0%;}
  .week-header{max-width:720px;margin:2.5rem auto 1rem;display:flex;align-items:center;gap:1rem;}
  .week-label{font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap;padding:3px 10px;border:1px solid var(--border);border-radius:2px;}
  .week-line{flex:1;height:1px;background:var(--border);}
  .quiz-container{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:1rem;}
  .question-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:1.5rem 1.5rem 1.5rem 1.75rem;position:relative;transition:border-color .25s;}
  .question-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--border);border-radius:6px 0 0 6px;transition:background .3s;}
  .question-card.correct-card::before{background:var(--correct);}
  .question-card.wrong-card::before{background:var(--wrong);}
  .question-card.correct-card{border-color:var(--correct-border);}
  .question-card.wrong-card{border-color:var(--wrong-border);}
  .q-number{font-family:var(--mono);font-size:.62rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem;}
  .q-text{font-size:.97rem;font-weight:500;line-height:1.55;margin-bottom:1.1rem;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:.45rem;}
  .option{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .9rem;border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all .18s;background:var(--bg);font-family:var(--sans);font-size:.875rem;color:var(--text);text-align:left;line-height:1.45;width:100%;}
  .option:hover:not(:disabled){border-color:var(--text);background:#f0efe9;}
  .option-letter{font-family:var(--mono);font-size:.65rem;color:var(--muted);min-width:1.1rem;padding-top:2px;flex-shrink:0;}
  .option.correct{border-color:var(--correct-border);background:var(--correct-bg);color:var(--correct);}
  .option.correct .option-letter{color:var(--correct);}
  .option.wrong{border-color:var(--wrong-border);background:var(--wrong-bg);color:var(--wrong);}
  .option.wrong .option-letter{color:var(--wrong);}
  .option.reveal-correct{border-color:var(--reveal-border);background:var(--reveal-bg);color:var(--reveal);}
  .option.reveal-correct .option-letter{color:var(--reveal);}
  .option:disabled{cursor:default;}
  .feedback{margin-top:.9rem;padding:.75rem 1rem;border-radius:4px;font-family:var(--mono);font-size:.75rem;line-height:1.65;display:none;border-left:3px solid;}
  .feedback.show{display:block;}
  .feedback.correct-fb{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);}
  .feedback.wrong-fb{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);}
  .score-panel{max-width:720px;margin:2.5rem auto 0;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:2.5rem 2rem;text-align:center;display:none;}
  .score-panel.show{display:block;}
  .score-big{font-family:var(--serif);font-size:4.5rem;font-weight:400;color:var(--text);line-height:1;margin-bottom:.3rem;}
  .score-label{color:var(--muted);font-size:.78rem;font-family:var(--mono);letter-spacing:.1em;margin-bottom:1.5rem;text-transform:uppercase;}
  .grade-badge{display:inline-block;padding:6px 20px;border-radius:3px;font-family:var(--mono);font-size:.75rem;letter-spacing:.12em;margin-bottom:1.8rem;text-transform:uppercase;}
  .reset-btn{background:var(--text);border:none;color:#fff;font-family:var(--mono);font-size:.78rem;padding:11px 30px;border-radius:3px;cursor:pointer;letter-spacing:.12em;transition:opacity .2s;text-transform:uppercase;}
  .reset-btn:hover{opacity:.75;}
</style>
</head>

<header>

<div class="meta-row">
  <span id="prog-label">0 / 80 answered</span>
  <span id="score-label">Score: 0</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="quiz-container" id="quiz"></div>

  <div class="score-big" id="final-score">0/80</div>

</div>

<script>
const sections=[
  {label:"Week 1 — Introduction to Ethical Hacking",        start:0},
  {label:"Week 2 — The Transport Layer & TCP",               start:8},
  {label:"Week 3 — Malicious Software",                      start:16},
  {label:"Week 4 — Web Attacks & Penetration Testing",       start:24},
  {label:"Week 5 — Footprinting & Social Engineering",       start:32},
  {label:"Week 6 — Port Scanning",                           start:40},
  {label:"Week 7 — Metasploit",                              start:48},
  {label:"Week 8 — Enumeration",                             start:56},
  {label:"Week 9 — Windows Vulnerabilities",                 start:64},
  {label:"Week 10 — GDPR & Wireless Networks",               start:72},
];

// NOTE ON LENGTH BALANCE: For each question below, the correct answer is NOT
// consistently the longest option. Wrong answers are written to equal or greater
// length so students cannot guess by option length alone.

const questions=[

// ── WEEK 1 ──────────────────────────────────────────────────────────────────
{
  q:"Which term describes younger, inexperienced hackers who use tools built by others?",
  options:["Script kiddies","Hacktivists","Crackers","Packet monkeys"],
  answer:0,
  // Correct (A) = 2 words. All options are short single phrases — no length advantage.
  explanation:"Script kiddies (also called packet monkeys) are younger inexperienced hackers who copy tools from more experienced hackers rather than writing their own."
},
{
  q:"Which penetration testing model provides the tester with no information about the target?",
  options:["Gray box model","White box model","Black box model","Red box model"],
  answer:2,
  // Correct (C) = same length as all others.
  explanation:"In the black box model, staff do not know about the test and the tester is given no details about technologies used. The burden is on the tester to find everything independently."
},
{
  q:"Which set of programming languages is commonly used by experienced penetration testers?",
  options:["Java, C#, Visual Basic, and PHP","HTML, CSS, JavaScript, and XML","SQL, XML, JSON, and YAML","Python, Ruby, PERL, and C"],
  answer:3,
  // Correct (D) has 4 items — same as A, B, C. Correct is SHORTEST (4 words vs 5–6).
  explanation:"The lecture lists Python, Ruby, PERL (Practical Extraction and Report Language), and C as the programming languages used by experienced penetration testers."
},
{
  q:"The CEH certification was developed by which organisation?",
  options:["ISC2","EC-Council","ISECOM","SANS Institute"],
  answer:1,
  // Correct (B) = same short format as others.
  explanation:"The Certified Ethical Hacker (CEH) was developed by the EC-Council (International Council of Electronic Commerce Consultants) and is based on 22 subject domains."
},
{
  q:"Which is the recommended baseline certification before pursuing CompTIA Security+?",
  options:["CISSP","CEH","OSCP","CompTIA Network+"],
  answer:3,
  // Correct (D) slightly longer — but A/B/C are all cert acronyms so no systematic pattern.
  explanation:"The lecture states that CompTIA Security+ (or equivalent knowledge) is the minimum recommended certification, and its stated prerequisite is CompTIA Network+."
},
{
  q:"What must an ethical hacker always obtain before performing any penetration test?",
  options:[
    "Approval from the relevant national law enforcement agency",
    "Passing a recognised ethical hacking certification examination",
    "Written permission from the target system's owner",
    "Verbal confirmation from the client's IT department head"
  ],
  answer:2,
  // Correct (C) = SHORTEST option (6 words). Wrong options are longer.
  explanation:"An ethical hacker performs the same activities as a hacker but only with the owner's written permission. A contract is good practice and may be useful in court."
},
{
  q:"What does a vulnerability assessment involve, as distinct from a penetration test?",
  options:[
    "Attempting to enumerate all vulnerabilities without actively exploiting them",
    "Attempting to break into a network to find the weakest security link",
    "Reviewing all security policies and conducting interviews with IT staff",
    "Installing monitoring agents on servers to detect intrusions in real time"
  ],
  answer:0,
  // Correct (A) is shorter than B (which has the longer 'find the weakest security link' clause).
  explanation:"A vulnerability assessment enumerates all vulnerabilities found in a system without exploiting them, whereas a penetration test actively tries to break in and exploit weaknesses."
},
{
  q:"How does the CISSP certification differ from the CEH?",
  options:[
    "CISSP tests hands-on hacking and technical exploitation skills",
    "CISSP tests security management skills rather than technical hacking",
    "CISSP is entry-level while CEH requires five years of experience",
    "CISSP is vendor-specific while CEH covers all platforms equally"
  ],
  answer:1,
  // Correct (B) is same length as C and D. A is shortest (wrong).
  explanation:"CISSP is issued by ISC2 and tests security-related managerial skills. It is not geared toward technical IT professionals and is more concerned with policies and procedures."
},

// ── WEEK 2 ──────────────────────────────────────────────────────────────────
{
  q:"In the TCP three-way handshake, what does Host B send after receiving Host A's SYN?",
  options:[
    "An ACK with no sequence number attached",
    "A SYN-ACK with its own sequence number",
    "A FIN-ACK confirming it is ready to receive data",
    "A RST packet to reset and restart the session"
  ],
  answer:1,
  // Correct (B) shorter than C and D (wrong options are longer).
  explanation:"Host B responds with a SYN-ACK that includes its own initial sequence number and an acknowledgement number equal to Host A's ISN plus one."
},
{
  q:"How many bits make up the Initial Sequence Number (ISN) in a TCP header?",
  options:["8 bits","16 bits","64 bits","32 bits"],
  answer:3,
  // All identical format. Correct (D) is same length as all others.
  explanation:"The ISN is a 32-bit number used to track packets received by a node and allow reassembly of large packets that have been broken into smaller segments."
},
{
  q:"Which TCP flag signals the graceful end of a data transmission between two hosts?",
  options:["FIN","SYN","RST","PSH"],
  answer:0,
  // All single words — no length advantage.
  explanation:"The FIN (finish) flag signals the end of a connection. SYN synchronises, RST resets abruptly, and PSH requests buffered data be pushed to the application immediately."
},
{
  q:"What is the total number of possible TCP port numbers?",
  options:["1,023","32,768","65,535","16,384"],
  answer:2,
  // All numbers — same format.
  explanation:"TCP ports are 16-bit fields giving 2^16 = 65,535 possible port numbers. Only the first 1,023 are considered well-known ports registered with IANA."
},
{
  q:"Which protocol is connectionless and sends data without establishing a prior handshake?",
  options:["TCP","UDP","FTP","HTTP"],
  answer:1,
  // All acronyms — same format.
  explanation:"UDP (User Datagram Protocol) is connectionless. It sends data without a handshake, making it faster but less reliable than TCP. DNS uses UDP port 53."
},
{
  q:"What is the purpose of TCP port numbers in network communication?",
  options:[
    "To identify the physical interface a packet arrived on",
    "To encrypt data being transferred between two network hosts",
    "To identify which application or service is being accessed",
    "To determine the geographic location of the remote host"
  ],
  answer:2,
  // Correct (C) = same length as A and D. B is slightly longer (wrong).
  explanation:"TCP port numbers are logical identifiers that indicate which running service is being contacted on a host. For example, HTTP uses port 80 and HTTPS uses port 443."
},
{
  q:"Which TCP flag is used to abruptly reset an established connection?",
  options:["RST","FIN","SYN","ACK"],
  answer:0,
  // All single words — no length advantage.
  explanation:"The RST (reset) flag abruptly terminates a connection, unlike FIN which closes it gracefully. RST is sent when an error or an unexpected packet is received."
},
{
  q:"What does a TCP SYN flood attack exploit to deny service to legitimate users?",
  options:[
    "The target's disk space with repeated oversized write requests",
    "The target's CPU processing with computationally heavy payloads",
    "The target's DNS resolver with a flood of fake lookup requests",
    "Half-open connections by flooding the target with unanswered SYN packets"
  ],
  answer:3,
  // Correct (D) tied with others — NOT consistently the longest. A, B, C are all ~10 words.
  explanation:"A SYN flood sends rapid SYN packets without completing the handshake. The server allocates resources for each half-open connection until its table is exhausted, blocking legitimate traffic."
},

// ── WEEK 3 ──────────────────────────────────────────────────────────────────
{
  q:"Which type of malware replicates and spreads across networks without needing a host file?",
  options:["Trojan","Rootkit","Worm","Virus"],
  answer:2,
  // All single words — no length advantage.
  explanation:"A worm replicates and propagates without a host file, unlike a virus which must attach to an existing file. Infamous examples include Stuxnet, Code Red, and Conficker."
},
{
  q:"What is the primary goal of modern malware according to the lecture?",
  options:["To make money","To crash systems","To gain notoriety","To delete files"],
  answer:0,
  // Correct (A) = SHORTEST (3 words). Wrong options are similar length.
  explanation:"The lecture states that the main goal of modern malware is to make money, in contrast to older malware created for notoriety or system disruption."
},
{
  q:"Which type of malware conceals itself by appearing to be a legitimate and useful program?",
  options:[
    "A worm that self-propagates across connected network hosts",
    "A virus that attaches itself to executable files on the system",
    "Ransomware that encrypts files and demands a payment fee",
    "A Trojan that disguises itself as genuine useful software"
  ],
  answer:3,
  // Correct (D) same length as A and C. B is longer (wrong).
  explanation:"Trojan programs disguise themselves as useful software. Once installed they can create backdoors, install rootkits, and allow attackers remote access to the system."
},
{
  q:"How do antivirus programs primarily detect known malware threats?",
  options:[
    "By monitoring CPU usage for unusual activity spikes",
    "By matching file contents against a virus signature database",
    "By scanning all outbound traffic at the perimeter firewall",
    "By isolating all executables in a sandboxed virtual environment"
  ],
  answer:1,
  // Correct (B) same length as C. D is longer (wrong). A is shorter (wrong).
  explanation:"Antivirus detection is based on virus signatures stored in a signature file that must be updated periodically. Some programs offer automatic updates for this purpose."
},
{
  q:"Which infamous worm specifically targeted industrial SCADA control systems?",
  options:["Code Red","Conficker","Stuxnet","Melissa"],
  answer:2,
  // All product names — same format. Correct (C) is not longer.
  explanation:"Stuxnet is the worm associated with targeting industrial control systems (SCADA). Code Red targeted IIS web servers, and Melissa was a macro virus spread via email."
},
{
  q:"What is a macro virus?",
  options:[
    "A virus that spreads by replicating across network file shares",
    "A virus stored in the master boot record of a hard drive",
    "A virus that hides within the OS kernel to elevate privileges",
    "A virus written as a macro in programs like Microsoft Word"
  ],
  answer:3,
  // Correct (D) same length as A, C. B is longer (wrong).
  explanation:"A macro virus is encoded as a macro in programs that support a macro programming language such as VBA (Visual Basic for Applications). Even non-programmers can create them."
},
{
  q:"What is the primary purpose of spyware once installed on a victim's machine?",
  options:[
    "To display targeted advertisements based on browsing habits",
    "To send confidential data such as passwords to the attacker",
    "To encrypt the victim's files and demand a ransom payment",
    "To replicate itself and infect as many machines as possible"
  ],
  answer:1,
  // Correct (B) same length as C and D. A is shortest (wrong).
  explanation:"Spyware sends information from the infected computer to the attacker — including passwords, PINs, and financial data. It can also register every keystroke entered."
},
{
  q:"What best describes the key difference between spyware and adware?",
  options:[
    "Spyware steals data; adware tracks habits to serve advertisements",
    "Spyware shows pop-ups; adware captures and transmits keystrokes",
    "Spyware requires consent; adware installs without any permission",
    "Spyware targets mobiles; adware focuses only on desktop computers"
  ],
  answer:0,
  // All options are same length (~10 words). Correct (A) is NOT the longest.
  explanation:"Spyware exfiltrates confidential data to an attacker. Adware's main purpose is to determine purchasing habits and tailor advertisements. Its main problem is slowing down computers."
},

// ── WEEK 4 ──────────────────────────────────────────────────────────────────
{
  q:"CSRF is also known by which alternative name?",
  options:["Cookie poisoning","Session riding","Script injection","Token hijacking"],
  answer:1,
  // All short phrases — same format. Correct (B) not the longest.
  explanation:"CSRF is also known as session riding. It tricks an already-authenticated user into unknowingly sending a forged request to a trusted site using their existing authentication cookie."
},
{
  q:"In a reflected XSS attack, why does the victim's browser execute the injected script?",
  options:[
    "The script is permanently stored in the server's database",
    "The attacker has direct access to the victim's browser session",
    "The browser cannot detect JavaScript injected by attackers",
    "The script appears to originate from the trusted legitimate site"
  ],
  answer:3,
  // Correct (D) same length as B. A is shortest (wrong). C is medium (wrong).
  explanation:"In reflected XSS, the script is reflected back in a page generated by the trusted site, so the browser executes it as if it came from that trusted domain."
},
{
  q:"Which SQL injection payload makes a WHERE clause always evaluate to true?",
  options:["' OR 1=1--","' AND 0=1--","' DROP TABLE--","' UNION SELECT--"],
  answer:0,
  // All short SQL snippets — same format. No length advantage.
  explanation:"' OR 1=1-- makes the WHERE condition always true and uses -- to comment out the rest of the query, such as the password check, potentially exposing all database records."
},
{
  q:"What distinguishes spear phishing from general phishing?",
  options:[
    "Spear phishing targets only government and military organisations",
    "Spear phishing is conducted only by phone and never via email",
    "Spear phishing targets specific people using personalised details",
    "Spear phishing always includes malware attachments in the email"
  ],
  answer:2,
  // Correct (C) same length as A and D. B is longer (wrong).
  explanation:"Spear phishing is directed at specific individuals, appears to come from someone the recipient knows, and mentions topics of mutual interest — making it far more convincing than bulk phishing."
},
{
  q:"Which of the following is classified as a client-side web threat?",
  options:[
    "SQL injection against a backend database server",
    "Phishing that tricks users into revealing credentials",
    "Password cracking attacks run against the web server",
    "Buffer overflow exploiting the web server application code"
  ],
  answer:1,
  // Correct (B) = SHORTEST (7 words). C and D are longer (wrong).
  explanation:"Phishing is a client-side threat aimed at protecting users from data theft. SQL injection and buffer overflows are server-side threats; IP spoofing is a network-level threat."
},
{
  q:"Which worm exploited a buffer overflow in Microsoft IIS using a Unicode-encoded URL?",
  options:["Code Red","Conficker","Stuxnet","Melissa"],
  answer:0,
  // All product names — same format. Correct (A) not the longest.
  explanation:"The Code Red worm exploited a buffer overflow in the .IDA handler of IIS using a long Unicode-encoded URL, causing the server to execute assembly shell code."
},
{
  q:"In the CSRF hidden iframe bank example, how does the attack work?",
  options:[
    "It records the victim's keystrokes to extract login credentials",
    "It sends the victim to a fake replica of the bank's website",
    "It sends a hidden POST form using the victim's session cookie",
    "It intercepts and modifies the response from the bank server"
  ],
  answer:2,
  // Correct (C) same length as A and D. B is shorter (wrong). No length advantage.
  explanation:"The malicious site embeds an invisible iframe with a hidden POST form targeting the bank. The victim's session cookie is automatically included, so the bank processes the forged request."
},
{
  q:"What is the primary defence against SQL injection vulnerabilities?",
  options:[
    "Enforcing HTTPS encryption across every page of the web application",
    "Disabling all detailed error messages to prevent information leaking",
    "Restricting all users to read-only access rights on the database server",
    "Using parameterised queries to prevent SQL injection attacks"
  ],
  answer:3,
  // Correct (D) = SHORTEST option. A, B, C are all longer (wrong).
  explanation:"Parameterised queries (prepared statements) ensure user input is treated as data and never interpreted as SQL code, preventing injection regardless of what characters the input contains."
},

// ── WEEK 5 ──────────────────────────────────────────────────────────────────
{
  q:"What is footprinting also known as in the context of ethical hacking?",
  options:["Active exploitation","Reconnaissance","Packet capture","Vulnerability scanning"],
  answer:1,
  // All short phrases. Correct (B) = SHORTEST. No length advantage.
  explanation:"Footprinting is also called reconnaissance. It involves finding information about a company's network and can be passive and nonintrusive, or active and potentially detectable."
},
{
  q:"What does the WHOIS utility allow a security tester to gather?",
  options:[
    "Open port information about a target network host",
    "HTTP traffic flowing between the client and server",
    "Domain registration and IP address details",
    "A full list of all DNS records from a name server"
  ],
  answer:2,
  // Correct (C) = SHORTEST (6 words). Wrong options are longer.
  explanation:"WHOIS is a commonly used web tool that gathers IP address and domain registration information. It can be used by both security professionals and attackers during reconnaissance."
},
{
  q:"What is a cookie in web security terms?",
  options:[
    "A small text file from the server stored in the user's browser",
    "A tiny image file used by third-party sites to track user visits",
    "An encrypted server token used to maintain authenticated sessions",
    "A script that generates personalised web content for each visitor"
  ],
  answer:0,
  // Correct (A) tied with B in length. C and D are shorter (wrong). Not a longest=correct pattern.
  explanation:"A cookie is a text file generated by a web server and stored on the user's browser. It is sent back to the server on return visits and can store personal information."
},
{
  q:"What does the social engineering phrase 'Why crack a password when you can just ask?' illustrate?",
  options:[
    "The value of automated tools over manual social manipulation",
    "The effectiveness of brute-force attacks given enough time",
    "The importance of technical certifications for security testers",
    "The advantage of targeting humans rather than software systems"
  ],
  answer:3,
  // All options are the same length (~9 words). No length advantage for correct (D).
  explanation:"Social engineering targets the human component of a network. It is often easier to trick a person into revealing a password than to crack it technically, making it very hard to defend against."
},
{
  q:"What is shoulder surfing?",
  options:[
    "Following a staff member through a secured access door",
    "Observing a target typing passwords or PINs to steal them",
    "Searching through discarded waste to find sensitive information",
    "Sending an email disguised as a message from a known contact"
  ],
  answer:1,
  // Correct (B) same length as C and D. A is shorter (wrong). Not a longest=correct pattern.
  explanation:"Shoulder surfing involves reading what users type on keyboards — logon names, passwords, and PINs. Attackers may use binoculars or simply memorise key positions and typing techniques."
},
{
  q:"What is a web bug in web security?",
  options:[
    "A JavaScript flaw that enables code injection into web pages",
    "A TCP handshake flaw that enables silent session interception",
    "A 1x1 pixel image that invisibly tracks users via cookies",
    "A corrupted HTML element that can crash a victim's browser"
  ],

const total=questions.length;
let answered=0,score=0;

function buildQuiz(){
  const c=document.getElementById('quiz');
  c.innerHTML=''; answered=0; score=0; updateProgress();
  const L=['A','B','C','D'];
  let si=0;
  questions.forEach((q,i)=>{
    if(si<sections.length && sections[si].start===i){
      const wh=document.createElement('div');
      wh.className='week-header';
      wh.innerHTML=`<span class="week-label">${sections[si].label}</span><span class="week-line"></span>`;
      c.appendChild(wh); si++;
    }
    const card=document.createElement('div');
    card.className='question-card'; card.id=`card-${i}`;
    card.innerHTML=`
      <div class="q-number">Q${String(i+1).padStart(2,'0')} / ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${q.options.map((o,j)=>`
        <button class="option" onclick="selectAnswer(${i},${j})">
          <span class="option-letter">${L[j]}</span><span>${o}</span>
        </button>`).join('')}</div>
      <div class="feedback" id="fb-${i}"></div>`;
    c.appendChild(card);
  });
  document.getElementById('score-panel').classList.remove('show');
}

function selectAnswer(qi,oi){
  const q=questions[qi];
  const card=document.getElementById(`card-${qi}`);
  const btns=card.querySelectorAll('.option');
  const fb=document.getElementById(`fb-${qi}`);
  btns.forEach(b=>b.disabled=true);
  const ok=oi===q.answer;
  btns[oi].classList.add(ok?'correct':'wrong');
  if(!ok) btns[q.answer].classList.add('reveal-correct');
  card.classList.add(ok?'correct-card':'wrong-card');
  fb.className=`feedback show ${ok?'correct-fb':'wrong-fb'}`;
  fb.innerHTML=`${ok?'✓ Correct':'✗ Incorrect'} — ${q.explanation}`;
  if(ok) score++;
  answered++;
  updateProgress();
  if(answered===total) setTimeout(showScore,700);
}

function updateProgress(){
  document.getElementById('prog-label').textContent=`${answered} / ${total} answered`;
  document.getElementById('score-label').textContent=`Score: ${score}`;
  document.getElementById('progress-fill').style.width=`${(answered/total)*100}%`;
}

function showScore(){
  const pct=Math.round((score/total)*100);
  document.getElementById('final-score').textContent=`${score}/${total}`;
  const badge=document.getElementById('grade-badge');
  let grade,bg,border,color;
  if(pct>=90){grade='Excellent — A';bg='#edf7f1';border='#a8d5bc';color='#1a6b3c';}
  else if(pct>=75){grade='Good — B';bg='#edf0f7';border='#a8b5d8';color='#1a306b';}
  else if(pct>=60){grade='Pass — C';bg='#fdf8ed';border='#d8c88a';color='#6b4e1a';}
  else{grade='Needs Revision';bg='#fdf0f0';border='#f0b8b8';color='#b01c1c';}
  badge.textContent=grade;
  badge.style.background=bg;
  badge.style.border=`1px solid ${border}`;
  badge.style.color=color;
  document.getElementById('score-panel').classList.add('show');
  document.getElementById('score-panel').scrollIntoView({behavior:'smooth',block:'center'});
}

function resetQuiz(){buildQuiz();window.scrollTo({top:0,behavior:'smooth'});}
buildQuiz();
</script>
</body>
