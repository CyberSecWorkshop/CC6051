<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC6051 – Metasploit Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #161f30;
    --border: #1e2d45;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --correct: #00ff87;
    --wrong: #ff4d6d;
    --text: #e2eaf4;
    --muted: #6b7fa3;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 90% 80%, rgba(255,77,109,0.05) 0%, transparent 60%);
  }

  header {
    text-align: center;
    max-width: 760px;
    margin: 0 auto 3rem;
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-family: var(--mono);
  }

  .quiz-container {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0.4;
  }

  .question-card.answered::before { opacity: 1; }
  .question-card.correct-card::before { background: var(--correct); }
  .question-card.wrong-card::before { background: var(--wrong); }

  .q-number {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1.2rem;
    color: #cdd9ee;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--text);
    text-align: left;
    line-height: 1.4;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,229,255,0.04);
  }

  .option-letter {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 1.2rem;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(0,255,135,0.06);
    color: var(--correct);
  }

  .option.correct .option-letter { color: var(--correct); }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,77,109,0.06);
    color: var(--wrong);
  }

  .option.wrong .option-letter { color: var(--wrong); }

  .option.reveal-correct {
    border-color: rgba(0,255,135,0.4);
    background: rgba(0,255,135,0.03);
    color: var(--correct);
  }

  .option:disabled { cursor: default; }

  .feedback {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 0.8rem;
    line-height: 1.6;
    display: none;
    border-left: 3px solid;
  }

  .feedback.show { display: block; }
  .feedback.correct-fb { border-color: var(--correct); background: rgba(0,255,135,0.05); color: #a0ffd4; }
  .feedback.wrong-fb { border-color: var(--wrong); background: rgba(255,77,109,0.05); color: #ffa0b2; }

  .score-panel {
    max-width: 760px;
    margin: 2rem auto 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    display: none;
  }

  .score-panel.show { display: block; }

  .score-big {
    font-size: 4rem;
    font-weight: 800;
    font-family: var(--mono);
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .score-label {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  .grade-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 10px 28px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .reset-btn:hover { background: rgba(0,229,255,0.1); }

  .progress-bar {
    max-width: 760px;
    margin: 0 auto 2rem;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b4d8);
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    max-width: 760px;
    margin: 0 auto 0.5rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <div class="tag">CC6051 · Ethical Hacking · Metasploit</div>
  <h1>Meta<br><span>sploit</span></h1>
  <p class="subtitle">20-question multiple choice quiz</p>
</header>

<div class="progress-text">
  <span id="prog-label">0 / 20 answered</span>
  <span id="score-label">Score: 0</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="quiz-container" id="quiz"></div>

<div class="score-panel" id="score-panel">
  <div class="score-big" id="final-score">0/20</div>
  <div class="score-label">Final Score</div>
  <div class="grade-badge" id="grade-badge"></div>
  <br>
  <button class="reset-btn" onclick="resetQuiz()">↺ Retake Quiz</button>
</div>

<script>
const questions = [
  {
    // correct: A (index 0)
    q: "What are the two main editions of Metasploit?",
    options: [
      "A free community edition and a commercial Pro edition",
      "A Windows edition and a Linux-only edition",
      "A student edition and a corporate enterprise edition",
      "A local edition and a cloud-hosted remote edition"
    ],
    answer: 0,
    explanation: "Metasploit comes in two versions: the free community edition (Metasploit Framework), which is what is used in this module, and the commercial Metasploit Pro edition aimed at enterprise security teams."
  },
  {
    // correct: B (index 1)
    q: "Which operating system is the primary platform used for Metasploit in this module?",
    options: [
      "Ubuntu Linux 14.04 LTS",
      "Kali Linux",
      "Windows Server 2012 R2",
      "Red Hat Enterprise Linux 7"
    ],
    answer: 1,
    explanation: "Kali Linux is the primary platform. It is a Debian-based distribution built for penetration testing that comes with Metasploit pre-installed alongside many other security tools, making it the standard choice in this module."
  },
  {
    // correct: C (index 2)
    q: "What is the name of the primary command-line interface used to interact with Metasploit?",
    options: [
      "armitage",
      "metasploit-shell",
      "msfconsole",
      "msf-terminal"
    ],
    answer: 2,
    explanation: "msfconsole is the primary interface for the Metasploit framework. It is a purpose-built command shell that gives full access to all framework features — searching, configuring, and executing exploit modules — from a single prompt."
  },
  {
    // correct: D (index 3)
    q: "After finding a module with the 'search' command, which command loads it into the active working context?",
    options: [
      "load",
      "select",
      "activate",
      "use"
    ],
    answer: 3,
    explanation: "The 'use' command followed by the module path loads that module into context. From that point, all configuration and execution commands — such as set, show, and run — apply to that specific module."
  },
  {
    // correct: A (index 0)
    q: "What does the 'back' command do within msfconsole?",
    options: [
      "Steps you out of the current module and returns you to the base msf prompt",
      "Reverts the most recently executed command in the session",
      "Terminates the active connection to the target host",
      "Navigates backwards through your previous command history"
    ],
    answer: 0,
    explanation: "'back' exits the current module context and returns you to the top-level msf prompt. It is used when you want to leave a loaded module without closing msfconsole — for example, to load a different module."
  },
  {
    // correct: B (index 1)
    q: "What does running 'show options' display for a loaded module?",
    options: [
      "A complete list of all exploit modules available in the framework",
      "The configurable parameters required to run the current module",
      "A summary of every active session currently open in the framework",
      "The post-exploitation commands supported after a successful exploit"
    ],
    answer: 1,
    explanation: "'show options' lists all the parameters for the currently loaded module — such as RHOSTS (target IP), LHOST (attacker IP), and LPORT — including whether each parameter is required and its current value."
  },
  {
    // correct: C (index 2)
    q: "Which command is used to configure a specific parameter in a loaded Metasploit module?",
    options: [
      "configure",
      "assign",
      "set",
      "define"
    ],
    answer: 2,
    explanation: "The 'set' command followed by the parameter name and value configures that module option. For example, 'set RHOSTS 192.168.1.50' tells the module which target IP address to use."
  },
  {
    // correct: D (index 3)
    q: "What information does the 'info' command provide about a loaded module?",
    options: [
      "A list of every module installed in the current framework version",
      "The network topology of hosts discovered during the last scan",
      "A count of active sessions and their associated target addresses",
      "Author details, CVE references, supported targets, and payload restrictions"
    ],
    answer: 3,
    explanation: "The 'info' command gives a full intelligence profile of the module: who authored it, the vulnerability references (CVE, Bugtraq), which operating systems or service versions it targets, and which payloads it supports. It is a key pre-flight check before running any exploit."
  },
  {
    // correct: A (index 0)
    q: "In Metasploit search results, what does a module rank of 'excellent' indicate?",
    options: [
      "The module is highly reliable and stable against its supported targets",
      "The module was added or updated in the most recent framework release",
      "The module requires elevated privileges on the attacker's machine to execute",
      "The module has been independently verified by Rapid7's research team"
    ],
    answer: 0,
    explanation: "Module ranks reflect reliability. 'Excellent' and 'great' indicate stable, dependable modules. Lower ranks such as 'normal', 'average', or 'low' mean the exploit works only under specific conditions or requires significant manual setup."
  },
  {
    // correct: B (index 1)
    q: "What is Armitage, and how does it relate to Metasploit?",
    options: [
      "A standalone scanner that operates independently of the Metasploit framework",
      "A graphical front end that visualises targets and exposes Metasploit features",
      "A command-line wrapper that simplifies msfconsole syntax for new users",
      "A reporting plugin that formats penetration test findings automatically"
    ],
    answer: 1,
    explanation: "Armitage is a graphical user interface for Metasploit. It does not replace the framework — every action in Armitage translates into the same commands msfconsole would run. It is particularly useful for managing multiple targets simultaneously."
  },
  {
    // correct: C (index 2)
    q: "In Armitage, how is a successfully compromised host visually indicated in the Targets panel?",
    options: [
      "The host icon turns blue and displays a padlock symbol",
      "The host icon flashes yellow to indicate an active open session",
      "The host icon turns red with a lightning bolt overlay",
      "The host icon is removed from the panel once access is confirmed"
    ],
    answer: 2,
    explanation: "Compromised hosts in Armitage are shown as red icons with a thunderstorm (lightning bolt) overlay. This visual feedback makes it immediately clear which machines in scope are under active control."
  },
  {
    // correct: D (index 3)
    q: "What does the Modules panel in Armitage provide?",
    options: [
      "A live log of all msfconsole commands being sent in the background",
      "A real-time map of the network topology discovered during scanning",
      "A configuration form for setting LHOST and LPORT listener values",
      "A browsable tree of all exploits, auxiliaries, and post-exploitation modules"
    ],
    answer: 3,
    explanation: "The Modules panel presents the entire Metasploit module library as a collapsible tree, organised by category. Double-clicking a module launches a configuration dialog — equivalent to running 'use' and 'show options' in msfconsole."
  },
  {
    // correct: A (index 0)
    q: "What is Metasploitable, and who provides it?",
    options: [
      "A deliberately vulnerable Linux VM released by Rapid7 for safe lab practice",
      "A hardened virtual machine used to test and verify defensive configurations",
      "A Windows VM pre-loaded with Metasploit, Armitage, and supporting tools",
      "A cloud-hosted practice environment requiring a paid Rapid7 subscription"
    ],
    answer: 0,
    explanation: "Metasploitable is a purposefully insecure Linux virtual machine created by Rapid7. It contains intentionally unpatched services and misconfigurations, making it a legal and controlled target for practising Metasploit techniques without risk."
  },
  {
    // correct: B (index 1)
    q: "How are passwords stored on Windows operating systems?",
    options: [
      "In plain text within the Registry under HKEY_LOCAL_MACHINE\\SAM",
      "As NTLM hashes inside the Security Account Manager (SAM) database",
      "As SHA-256 hashes stored in the Active Directory domain schema",
      "In AES-encrypted files located within the System32 directory"
    ],
    answer: 1,
    explanation: "Windows stores passwords as NTLM (NT LAN Manager) hashes in the SAM database. These hashes are not plaintext, but they can still be leveraged in Pass-the-Hash attacks, making their recovery a significant penetration testing finding."
  },
  {
    // correct: C (index 2)
    q: "When reviewing the hashdump output, which RID value identifies the built-in Windows Administrator account?",
    options: [
      "1001",
      "1000",
      "500",
      "0"
    ],
    answer: 2,
    explanation: "The Relative Identifier (RID) 500 is assigned to the built-in Administrator account on every Windows system. Recovering the hash for RID 500 during an assessment is a high-severity finding, as it demonstrates access to the highest-privileged local account."
  },
  {
    // correct: D (index 3)
    q: "What makes Meterpreter significantly harder to detect than a standard reverse shell payload?",
    options: [
      "It uses port 443 exclusively to blend with encrypted web traffic",
      "It disguises its network traffic as legitimate DNS lookup requests",
      "It masquerades as a known Windows system process in the process list",
      "It runs entirely in memory and does not write any files to disk"
    ],
    answer: 3,
    explanation: "Meterpreter is an in-memory payload — it loads directly into a running process and never touches the file system. This makes it much harder for antivirus software and file-based detection mechanisms to identify it compared to payloads that write to disk."
  },
  {
    // correct: A (index 0)
    q: "What does the 'hashdump' command retrieve when executed inside an active Meterpreter session?",
    options: [
      "Usernames and NTLM password hashes from the Windows SAM database",
      "A log of all files modified on the target in the last 24 hours",
      "A list of running processes and the accounts associated with each one",
      "Encrypted traffic captured across the network since session was opened"
    ],
    answer: 0,
    explanation: "hashdump queries the Windows SAM database through the Meterpreter session and returns all local account credentials in the format: username, RID, LM hash, NTLM hash. This is a core post-exploitation technique for credential harvesting."
  },
  {
    // correct: B (index 1)
    q: "What is pivoting in the context of a Metasploit penetration test?",
    options: [
      "Switching rapidly between multiple active Meterpreter sessions",
      "Routing traffic through a compromised host to reach otherwise inaccessible networks",
      "Changing the active payload on a session without losing access to the target",
      "Redirecting the target machine's outbound traffic through the attacker's system"
    ],
    answer: 1,
    explanation: "Pivoting uses a compromised host as a relay point. Because the pivot host has network access that the attacker's machine does not, traffic destined for an internal network segment is tunnelled through the Meterpreter session to reach machines that would otherwise be completely out of scope."
  },
  {
    // correct: C (index 2)
    q: "Which Metasploit command establishes a route through a compromised Meterpreter session to an internal network?",
    options: [
      "set pivot",
      "session tunnel",
      "route add",
      "proxy route"
    ],
    answer: 2,
    explanation: "'route add' followed by the target subnet and session ID instructs Metasploit to tunnel all traffic for that network range through the specified Meterpreter session. Once added, modules can be run against internal hosts as if the attacker had direct network access."
  },
  {
    // correct: D (index 3)
    q: "What is the purpose of the msfupdate command in Metasploit?",
    options: [
      "It resets the Metasploit database and clears all stored scan data",
      "It restarts the msfconsole process and reloads all cached modules",
      "It reconfigures the framework listener to use a new IP address and port",
      "It updates the framework with the latest exploit modules and vulnerability data"
    ],
    answer: 3,
    explanation: "msfupdate pulls the latest module additions and updates from Rapid7's repository. Keeping the framework current is important because new vulnerabilities are documented constantly, and outdated modules may miss recently disclosed exploits or fail against patched targets."
  }
];

let answered = 0;
let score = 0;

function buildQuiz() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  answered = 0;
  score = 0;
  updateProgress();

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;

    const letters = ['A', 'B', 'C', 'D'];

    card.innerHTML = `
      <div class="q-number">Question ${String(i+1).padStart(2,'0')} / 20</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, j) => `
          <button class="option" data-q="${i}" data-opt="${j}" onclick="selectAnswer(${i},${j})">
            <span class="option-letter">${letters[j]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });

  document.getElementById('score-panel').classList.remove('show');
}

function selectAnswer(qIndex, optIndex) {
  const q = questions[qIndex];
  const card = document.getElementById(`card-${qIndex}`);
  const buttons = card.querySelectorAll('.option');
  const fb = document.getElementById(`fb-${qIndex}`);

  buttons.forEach(b => b.disabled = true);

  const isCorrect = optIndex === q.answer;

  buttons[optIndex].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    buttons[q.answer].classList.add('reveal-correct');
  }

  card.classList.add('answered', isCorrect ? 'correct-card' : 'wrong-card');

  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `${isCorrect ? '✓ Correct' : '✗ Incorrect'} — ${q.explanation}`;

  if (isCorrect) score++;
  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showScore, 600);
  }
}

function updateProgress() {
  document.getElementById('prog-label').textContent = `${answered} / 20 answered`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(answered / 20) * 100}%`;
}

function showScore() {
  const panel = document.getElementById('score-panel');
  const pct = Math.round((score / 20) * 100);
  document.getElementById('final-score').textContent = `${score}/20`;

  const badge = document.getElementById('grade-badge');
  let grade, color;
  if (pct >= 90)      { grade = 'Excellent — A'; color = '#00ff87'; }
  else if (pct >= 75) { grade = 'Good — B';       color = '#00e5ff'; }
  else if (pct >= 60) { grade = 'Pass — C';        color = '#ffd700'; }
  else                { grade = 'Needs Revision — F'; color = '#ff4d6d'; }

  badge.textContent = grade;
  badge.style.background = color + '15';
  badge.style.border = `1px solid ${color}`;
  badge.style.color = color;

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
