<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC6051 – Footprinting & Social Engineering Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #161f30;
    --border: #1e2d45;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --correct: #00ff87;
    --wrong: #ff4d6d;
    --text: #e2eaf4;
    --muted: #6b7fa3;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 90% 80%, rgba(255,77,109,0.05) 0%, transparent 60%);
  }

  header {
    text-align: center;
    max-width: 760px;
    margin: 0 auto 3rem;
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-family: var(--mono);
  }

  .quiz-container {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0.4;
  }

  .question-card.answered::before { opacity: 1; }
  .question-card.correct-card::before { background: var(--correct); }
  .question-card.wrong-card::before { background: var(--wrong); }

  .q-number {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1.2rem;
    color: #cdd9ee;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--text);
    text-align: left;
    line-height: 1.4;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,229,255,0.04);
  }

  .option-letter {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 1.2rem;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(0,255,135,0.06);
    color: var(--correct);
  }

  .option.correct .option-letter { color: var(--correct); }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,77,109,0.06);
    color: var(--wrong);
  }

  .option.wrong .option-letter { color: var(--wrong); }

  .option.reveal-correct {
    border-color: rgba(0,255,135,0.4);
    background: rgba(0,255,135,0.03);
    color: var(--correct);
  }

  .option:disabled { cursor: default; }

  .feedback {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 0.8rem;
    line-height: 1.6;
    display: none;
    border-left: 3px solid;
  }

  .feedback.show { display: block; }
  .feedback.correct-fb { border-color: var(--correct); background: rgba(0,255,135,0.05); color: #a0ffd4; }
  .feedback.wrong-fb { border-color: var(--wrong); background: rgba(255,77,109,0.05); color: #ffa0b2; }

  .score-panel {
    max-width: 760px;
    margin: 2rem auto 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    display: none;
  }

  .score-panel.show { display: block; }

  .score-big {
    font-size: 4rem;
    font-weight: 800;
    font-family: var(--mono);
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .score-label {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  .grade-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 10px 28px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .reset-btn:hover { background: rgba(0,229,255,0.1); }

  .progress-bar {
    max-width: 760px;
    margin: 0 auto 2rem;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b4d8);
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    max-width: 760px;
    margin: 0 auto 0.5rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <div class="tag">CC6051 · Ethical Hacking</div>
  <h1>Footprinting &amp;<br><span>Social Engineering</span></h1>
  <p class="subtitle">20-question multiple choice quiz</p>
</header>

<div class="progress-text">
  <span id="prog-label">0 / 20 answered</span>
  <span id="score-label">Score: 0</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="quiz-container" id="quiz"></div>

<div class="score-panel" id="score-panel">
  <div class="score-big" id="final-score">0/20</div>
  <div class="score-label">Final Score</div>
  <div class="grade-badge" id="grade-badge"></div>
  <br>
  <button class="reset-btn" onclick="resetQuiz()">↺ Retake Quiz</button>
</div>

<script>
const questions = [
  {
    q: "What is footprinting in the context of ethical hacking?",
    options: [
      "Actively exploiting vulnerabilities on a target system",
      "Finding information about a company's network using passive and active techniques",
      "Capturing packets on a target network using Wireshark",
      "Installing malware on a target machine for later access"
    ],
    answer: 1,
    explanation: "Footprinting (also called reconnaissance) is the process of finding information about a company's network. It can be passive and nonintrusive, or active and potentially detectable."
  },
  {
    q: "Which of the following is an example of ACTIVE footprinting?",
    options: [
      "Searching a company's public website for staff names",
      "Querying WHOIS for domain registration details",
      "Performing a port scan against the target network",
      "Reading a company's press releases"
    ],
    answer: 2,
    explanation: "Active footprinting involves prodding the target network in ways that might be noticed — such as port scans, DNS zone transfers, or directly interacting with a target's web server."
  },
  {
    q: "What is the purpose of the WHOIS utility?",
    options: [
      "To scan for open ports on a remote host",
      "To gather IP address and domain registration information",
      "To intercept HTTP traffic between client and server",
      "To perform DNS zone transfers"
    ],
    answer: 1,
    explanation: "WHOIS is a commonly used web tool that gathers IP address and domain registration information. It can be used by both security professionals and attackers."
  },
  {
    q: "What is the Zed Attack Proxy (ZAP) used for?",
    options: [
      "Capturing raw network packets at the data link layer",
      "Cracking password hashes from a stolen database",
      "Scanning web applications for security vulnerabilities",
      "Performing DNS zone transfers against name servers"
    ],
    answer: 2,
    explanation: "ZAP (Zed Attack Proxy) is an open-source web application security scanner intended for both beginners and professional penetration testers. It runs on Linux, macOS, and Windows and requires Java."
  },
  {
    q: "What does 'spidering' (or crawling) a website mean in the context of ZAP?",
    options: [
      "Injecting SQL payloads into every input field on a site",
      "Automatically discovering web pages by following links from a starting URL",
      "Brute-forcing login credentials across all discovered pages",
      "Capturing all cookies set by the web server during a session"
    ],
    answer: 1,
    explanation: "Spidering is an automated method of discovering pages on a website by following links. In ZAP, the Spider tab displays filenames of discovered pages within seconds of starting."
  },
  {
    q: "After spidering a site in ZAP, what does the Active Scan feature do?",
    options: [
      "It monitors outbound traffic for data exfiltration",
      "It sends the web server a series of requests designed to identify vulnerabilities",
      "It decrypts HTTPS traffic to reveal plaintext content",
      "It compares the site's DNS records against a known-good baseline"
    ],
    answer: 1,
    explanation: "After spidering, ZAP's Active Scan sends crafted requests to the server to identify vulnerabilities. Results are shown in the Alerts tab with risk levels: High, Medium, Low, or Informational."
  },
  {
    q: "Which HTTP method is described as the most basic for pulling information from a web server?",
    options: [
      "POST",
      "PUT",
      "DELETE",
      "GET"
    ],
    answer: 3,
    explanation: "GET is the most basic HTTP method. Security testers can use HTTP commands including GET to pull information from a web server, and return codes can reveal information about the OS in use."
  },
  {
    q: "What is a cookie in the context of web security?",
    options: [
      "A type of malware that embeds itself in the browser cache",
      "A text file generated by a web server, stored on the user's browser, and sent back on return visits",
      "An encrypted token stored server-side to track user behaviour",
      "A hidden 1x1 pixel image used to track user activity"
    ],
    answer: 1,
    explanation: "A cookie is a text file generated by a web server and stored on the user's browser. It is sent back to the server when the user returns and is used to customise pages. Some cookies store personal information, which creates security issues."
  },
  {
    q: "What is a web bug, and how does it work?",
    options: [
      "A JavaScript vulnerability that allows code injection into web pages",
      "A 1x1 pixel image referenced in an IMG tag, often invisible, used similarly to spyware for data collection",
      "A flaw in the TCP handshake that allows session hijacking",
      "A corrupted HTML file that crashes the victim's browser"
    ],
    answer: 1,
    explanation: "A web bug is a 1x1 pixel image file referenced in an IMG tag. It often matches the page background colour, making it invisible. It works with a cookie and comes from third-party data collection companies, functioning similarly to spyware."
  },
  {
    q: "What is a DNS zone transfer, and why is it a security concern?",
    options: [
      "A method of encrypting DNS traffic to prevent eavesdropping",
      "A process that transfers all DNS records for a zone, potentially revealing the organisation's full network topology",
      "A technique for poisoning a DNS cache with forged entries",
      "A way of blocking unauthorised DNS queries from external resolvers"
    ],
    answer: 1,
    explanation: "A zone transfer copies all DNS records a server is responsible for. If an attacker successfully performs one, they obtain a network diagram of the organisation that can be used to attack other servers."
  },
  {
    q: "Which command-line tool is recommended for performing DNS zone transfers?",
    options: [
      "nmap",
      "netstat",
      "dig",
      "traceroute"
    ],
    answer: 2,
    explanation: "The dig command is the recommended tool for DNS zone transfers. It can be used to query the Start of Authority (SOA) record to find the primary DNS server and then attempt to retrieve all zone records."
  },
  {
    q: "What does a DNS Start of Authority (SOA) record indicate?",
    options: [
      "The IP address of the organisation's firewall",
      "Which name server is the primary authority for a zone and the zones or IP addresses it is responsible for",
      "The list of all open ports on the DNS server",
      "The encryption certificate used to sign DNS responses"
    ],
    answer: 1,
    explanation: "The SOA record identifies the primary DNS server for a zone and shows the zones or IP addresses it covers. It is the first step in determining what name server a company uses before attempting a zone transfer."
  },
  {
    q: "Which of the following best describes the main goal of social engineering?",
    options: [
      "To exploit software vulnerabilities in operating systems",
      "To intercept network packets using a man-in-the-middle attack",
      "To target the human component of a network to obtain confidential information",
      "To brute-force credentials against a login portal"
    ],
    answer: 2,
    explanation: "Social engineering targets the human component of a network. Its goals include obtaining confidential information such as passwords. The core idea is: why try to crack a password when you can simply ask for it?"
  },
  {
    q: "Why is social engineering considered the biggest security threat?",
    options: [
      "It requires expensive hardware that only nation-states can afford",
      "It is entirely automated and runs without attacker involvement",
      "It is the most difficult to protect against because it exploits human behaviour rather than software",
      "It always bypasses firewalls and intrusion detection systems"
    ],
    answer: 2,
    explanation: "Social engineering is considered the biggest security threat because it is the most difficult to defend against. It exploits human nature — social engineers study behaviour, recognise personality traits, and read body language and tone of voice."
  },
  {
    q: "Which social engineering tactic involves pressuring the victim by creating an artificial time constraint?",
    options: [
      "Quid pro quo",
      "Urgency",
      "Piggybacking",
      "Shoulder surfing"
    ],
    answer: 1,
    explanation: "Urgency is a social engineering technique that pressures the victim into acting quickly before they have time to think critically or verify the request. Other tactics include quid pro quo, kindness, position, and status quo."
  },
  {
    q: "What is shoulder surfing?",
    options: [
      "Trailing closely behind an authorised employee to gain access to a restricted area",
      "Sifting through a victim's discarded waste to find sensitive information",
      "Observing what a user types — such as passwords and PINs — by watching over their shoulder",
      "Sending a phishing email that appears to come from a known colleague"
    ],
    answer: 2,
    explanation: "Shoulder surfing involves reading what users enter on keyboards — logon names, passwords, and PINs. Attackers may use binoculars or high-powered telescopes, or simply memorise key positions and typing patterns."
  },
  {
    q: "Which of the following is a recommended prevention measure against shoulder surfing?",
    options: [
      "Use the same password across all accounts for simplicity",
      "Face your computer monitor toward a door or cubicle entryway for visibility",
      "Immediately change your password if you suspect someone was observing you",
      "Disable screen lock to avoid repeated password entry"
    ],
    answer: 2,
    explanation: "Prevention measures include facing the monitor away from doors or entryways, avoiding typing when someone is nearby, and immediately changing a password if you suspect observation."
  },
  {
    q: "What type of information might an attacker find through dumpster diving?",
    options: [
      "Encrypted database backups stored on the company server",
      "Live network traffic captured from the internal LAN",
      "Discarded items such as company phone directories, financial reports, passwords written down, and old manuals",
      "SSH private keys stored in the administrator's home directory"
    ],
    answer: 2,
    explanation: "Dumpster diving yields discarded items including computer manuals, written-down passwords, company phone directories, calendars, financial reports, interoffice memos, and more — all useful for an attacker."
  },
  {
    q: "What is piggybacking in physical security?",
    options: [
      "Installing a keylogger on a target machine while the user is away",
      "Trailing closely behind an authorised employee to gain entry to a restricted area",
      "Calling an employee and impersonating IT support to obtain a password",
      "Sending a bulk phishing email to all employees in an organisation"
    ],
    answer: 1,
    explanation: "Piggybacking involves trailing closely behind an employee who is cleared to enter a restricted area, exploiting their natural desire to be polite and hold the door. Attackers may wear fake badges to appear legitimate."
  },
  {
    q: "What distinguishes spear phishing from regular phishing?",
    options: [
      "Spear phishing only targets government organisations",
      "Spear phishing uses malware attachments whereas regular phishing uses fake websites",
      "Spear phishing is directed at specific individuals, appears to come from someone they know, and references topics of mutual interest",
      "Spear phishing relies entirely on phone calls rather than email"
    ],
    answer: 2,
    explanation: "Spear phishing combines social engineering with targeted exploitation. Unlike bulk phishing, it is directed at specific people, appears to come from a known sender, and mentions topics of mutual interest to increase credibility."
  }
];

let answered = 0;
let score = 0;

function buildQuiz() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  answered = 0;
  score = 0;
  updateProgress();

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;

    const letters = ['A', 'B', 'C', 'D'];

    card.innerHTML = `
      <div class="q-number">Question ${String(i+1).padStart(2,'0')} / 20</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, j) => `
          <button class="option" data-q="${i}" data-opt="${j}" onclick="selectAnswer(${i},${j})">
            <span class="option-letter">${letters[j]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });

  document.getElementById('score-panel').classList.remove('show');
}

function selectAnswer(qIndex, optIndex) {
  const q = questions[qIndex];
  const card = document.getElementById(`card-${qIndex}`);
  const buttons = card.querySelectorAll('.option');
  const fb = document.getElementById(`fb-${qIndex}`);

  buttons.forEach(b => b.disabled = true);

  const isCorrect = optIndex === q.answer;

  buttons[optIndex].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    buttons[q.answer].classList.add('reveal-correct');
  }

  card.classList.add('answered', isCorrect ? 'correct-card' : 'wrong-card');

  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `${isCorrect ? '✓ Correct' : '✗ Incorrect'} — ${q.explanation}`;

  if (isCorrect) score++;
  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showScore, 600);
  }
}

function updateProgress() {
  document.getElementById('prog-label').textContent = `${answered} / 20 answered`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(answered / 20) * 100}%`;
}

function showScore() {
  const panel = document.getElementById('score-panel');
  const pct = Math.round((score / 20) * 100);
  document.getElementById('final-score').textContent = `${score}/20`;

  const badge = document.getElementById('grade-badge');
  let grade, color;
  if (pct >= 90)      { grade = 'Excellent — A'; color = '#00ff87'; }
  else if (pct >= 75) { grade = 'Good — B';       color = '#00e5ff'; }
  else if (pct >= 60) { grade = 'Pass — C';        color = '#ffd700'; }
  else                { grade = 'Needs Revision — F'; color = '#ff4d6d'; }

  badge.textContent = grade;
  badge.style.background = color + '15';
  badge.style.border = `1px solid ${color}`;
  badge.style.color = color;

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
